name: R179 Linux x86-64 independent replay

on:
  workflow_dispatch:
    inputs:
      preregistration_commit:
        description: Public preregistration commit
        required: true
        type: string
      preregistration_discussion:
        description: Public GitHub Discussion URL
        required: true
        type: string
      preregistration_created_at:
        description: GitHub Discussion creation time in UTC
        required: true
        type: string

permissions:
  contents: read

jobs:
  linux-x86-64:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      MKL_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      PYTHONHASHSEED: "0"
      QISKIT_PARALLEL: "FALSE"
      RAYON_NUM_THREADS: "1"
    steps:
      - name: Check out the preregistered branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install pinned quantum dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "PyYAML>=6.0" \
            "numpy>=1.26" \
            "scipy>=1.11" \
            "qiskit==2.4.1" \
            "qiskit-aer>=0.17" \
            "qiskit-ibm-runtime==0.46.1" \
            "qiskit-qasm3-import>=0.6"

      - name: Build source-bound Linux accelerator
        run: |
          PYTHONPATH=tools python tools/b4_b8_r179_linux_x86_64_build.py \
            --preregistration-commit "${{ inputs.preregistration_commit }}" \
            --preregistration-discussion "${{ inputs.preregistration_discussion }}" \
            --preregistration-created-at "${{ inputs.preregistration_created_at }}"

      - name: Execute frozen 39-worker matrix
        run: |
          PYTHONPATH=tools python tools/b4_b8_r179_linux_x86_64_replay.py \
            --preregistration-commit "${{ inputs.preregistration_commit }}" \
            --preregistration-discussion "${{ inputs.preregistration_discussion }}" \
            --preregistration-created-at "${{ inputs.preregistration_created_at }}"

      - name: Run independent standard-library oracle
        run: |
          PYTHONPATH=tools python tools/b4_b8_r179_independent_linux_x86_64_oracle.py \
            --preregistration-commit "${{ inputs.preregistration_commit }}" \
            --preregistration-discussion "${{ inputs.preregistration_discussion }}"

      - name: Seal downloadable evidence bundle
        run: PYTHONPATH=tools python tools/b4_b8_r179_linux_x86_64_bundle.py

      - name: Write job summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          lines = ["# R179 Linux x86-64 replay"]
          for path in [
              Path("results/B4_B8_R179_linux_x86_64_replay_v0.json"),
              Path("results/B4_B8_R179_independent_linux_x86_64_oracle_v0.json"),
              Path("results/B4_B8_R179_linux_x86_64_bundle_manifest_v0.json"),
          ]:
              if path.exists():
                  payload = json.loads(path.read_text())
                  lines.extend(
                      [
                          "",
                          f"## {path.name}",
                          f"- Status: `{payload.get('status')}`",
                          f"- Payload: `{payload.get('payload_hash')}`",
                      ]
                  )
          Path("/tmp/r179-summary.md").write_text("\n".join(lines) + "\n")
          PY
          cat /tmp/r179-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload R179 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r179-linux-x86-64-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            research/source_lineage/Qiskit_2_4_1_R179_fixed_superaccumulator_pyext.x86_64-linux-gnu.so
            research/source_lineage/Qiskit_2_4_1_R179_linux_x86_64_build_manifest.json
            research/source_lineage/R179_linux_x86_64_build_logs
            research/B4_B8_R179_linux_x86_64_replay.md
            research/B4_B8_R179_independent_linux_x86_64_oracle.md
            results/B4_B8_R179_linux_x86_64_replay
            results/B4_B8_R179_linux_x86_64_replay_v0.json
            results/B4_B8_R179_independent_linux_x86_64_oracle_v0.json
            results/B4_B8_R179_linux_x86_64_bundle_manifest_v0.json
