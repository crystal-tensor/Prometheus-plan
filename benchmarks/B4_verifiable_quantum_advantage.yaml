- honest_noisy_quantum_simulator
- tensor_network_classical_simulator
- marginal_matching_spoofer
- low_depth_surrogate_spoofer
- generative_output_model_spoofer
- trap_aware_adaptive_adversary
metrics:
- completeness
- soundness
- sample_complexity
- classical_verification_time
- noise_robustness
- task_usefulness
