- hidden_parity_projection_sampling
- randomized_measurement_invariants
- classical_shadow_observable_tests
- cross_device_projection_consistency
baselines_and_adversaries:
- honest_invariant_sampler
- uniform_random_spoofer
- marginal_matching_spoofer
- public_invariant_spoofer
- leaked_half_invariant_spoofer
- weak_surrogate_spoofer
metrics:
- honest_completeness
- adversary_soundness
- sample_count
- invariant_count
- maximum_projection_error
- adversaries_failing_rule
acceptance_threshold:
  honest_completeness: '>=0.80'
  adversary_soundness: <=0.05
  adversaries_failing_rule: '>=3'
  explicit_not_full_distribution_verification: true
failure_conditions:
- invariants_are_public_and_easy_to_spoof
- sample_complexity_matches_full_distribution_learning
- verifier_cannot_hide_random_projections
- honest_noise_breaks_completeness
next_actions:
- replace_toy_parity_tasks_with_randomized_measurement_data
- add_classical_shadow_observable_tests
- connect_to_b4_trap_protocol_tasks
- add_adaptive_spoofer_interfaces
