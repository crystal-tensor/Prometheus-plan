id: B9
problem_id: 17
name: Quantum PCP and Local Hamiltonian Hardness
version: 0.1
status: draft
claim: >
  Small-instance local-Hamiltonian laboratories can expose proof-pattern
  candidates and counterexamples for gap amplification and locality-preserving
  transformations.
model_families:
  - transverse_ising_frustrated
  - xxz_chain
  - cluster_stabilizer_open
transformations:
  - local_interaction_reweight_v0
  - shifted_square_spectral_filter_v0
baselines:
  - exact_diagonalization_spectrum
  - normalized_gap_tracking
  - ground_state_overlap_tracking
metrics:
  - spectral_gap
  - normalized_gap
  - gap_ratio
  - normalized_gap_ratio
  - ground_state_overlap
  - locality_max
  - counterexample_candidate_count
acceptance_threshold:
  exact_small_instances: true
  candidate_pass_count: "tracked; zero is acceptable as a publishable negative signal"
  counterexample_candidate_count: ">=1"
  counterexample_tracking_required: true
  explicit_not_quantum_pcp_proof: true
failure_conditions:
  - gap_gain_is_only_global_rescaling
  - transformed_hamiltonian_loses_locality
  - ground_space_changes_unacceptably
  - normalized_gap_does_not_improve
next_actions:
  - add_product_test_inspired_transformations
  - search_random_local_hamiltonian_instances
  - export_counterexample_database
  - formalize_promising_patterns_in_proof_assistant
