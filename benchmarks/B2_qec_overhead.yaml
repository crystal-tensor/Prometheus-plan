id: B2
problem_id: 22
name: Low-Overhead Quantum Error Correction
version: 0.1
status: draft
claim: >
  A searched code family plus decoder can lower logical error per physical
  qubit or reduce qubit-time overhead against a surface-code baseline under at
  least one realistic noise regime.
input_families:
  - surface_code_memory
  - repetition_code_control
  - color_code_control
  - candidate_quantum_ldpc_graphs
  - candidate_subsystem_code_graphs
  - hardware_constrained_syndrome_schedules
simulation_tools:
  - name: Stim
    url: https://github.com/quantumlib/Stim
  - name: matching_decoder_baseline
  - name: learned_decoder_optional
noise_models:
  - depolarizing_circuit_level
  - biased_dephasing
  - measurement_error
  - leakage_proxy
  - correlated_two_qubit_stress_test
metrics:
  - logical_error_rate_per_round
  - threshold_estimate
  - threshold_confidence_interval
  - space_time_volume_per_target_logical_error
  - decoder_runtime_per_shot
  - noise_mismatch_robustness
acceptance_threshold:
  space_time_overhead_improvement: ">=25%"
  comparison_baseline: tuned_surface_code
  confidence_intervals_required: true
  reproducible_seeds_required: true
failure_conditions:
  - decoder_only_improves_on_training_noise
  - impractical_measurement_schedule_or_connectivity
  - decoder_runtime_scales_too_poorly
next_actions:
  - build_surface_code_memory_baseline
  - choose_matching_decoder
  - generate_initial_candidate_graphs
  - define_noise_sweep_grid
