id: B3
problem_id: 49
name: Molecular Reaction Dynamics Resource Estimation
version: 0.1
status: draft
claim: >
  Observable-first quantum algorithms can estimate reaction-relevant quantities
  with lower resources than full state preparation or full wavefunction
  reconstruction.
candidate_systems:
  - h2_calibration
  - lih_calibration
  - h2o_calibration
  - n2_calibration
  - small_transition_metal_active_site
  - nitrogen_fixation_proxy
  - photochemical_conical_intersection_proxy
tooling:
  - name: OpenFermion
    url: https://quantumai.google/openfermion
  - name: PySCF
    optional: true
  - name: resource_estimator
    status: to_build
baselines:
  - full_hamiltonian_phase_estimation
  - vqe_ansatz_resource_estimate
  - coupled_cluster_reference
  - selected_ci_reference
  - dmrg_or_tensor_network_reference
metrics:
  - target_observable_error
  - logical_qubits
  - t_count
  - t_depth
  - state_preparation_assumptions
  - classical_preprocessing_cost
  - active_space_sensitivity
acceptance_threshold:
  logical_depth_or_t_count_reduction: ">=5x"
  compared_to: full_hamiltonian_phase_estimation
  state_preparation_cost_included: true
failure_conditions:
  - gain_depends_on_unrealistic_qram
  - gain_hides_state_preparation_cost
  - classical_baseline_is_outdated_or_weak
  - molecule_too_small_to_show_hard_regime
next_actions:
  - create_openfermion_calibration_notebook
  - choose_first_reaction_proxy
  - define_resource_estimator_schema
  - collect_classical_reference_methods
