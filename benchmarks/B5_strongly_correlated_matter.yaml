id: B5
problem_id: 38
name: Strongly Correlated Matter via Hybrid Quantum-Tensor Solvers
version: 0.1
status: draft
claim: >
  Quantum subroutines can be used as entanglement kernels inside embedding,
  tensor-network, or variational many-body solvers, improving
  accuracy-per-resource on constrained strongly correlated models.
model_families:
  - one_dimensional_fermi_hubbard
  - two_dimensional_hubbard_plaquettes
  - frustrated_spin_chains
  - electron_phonon_toy_models
baselines:
  - exact_diagonalization_small_systems
  - cluster_product_proxy
  - dmrg_reference
  - dmft_or_embedding_reference
  - variational_monte_carlo_reference
metrics:
  - ground_state_energy_per_site
  - correlation_energy_recovered
  - observable_error
  - entanglement_cut_error
  - classical_runtime
  - quantum_subroutine_calls
acceptance_threshold:
  accuracy_per_resource_improvement: ">=20%"
  compared_to: tuned_classical_embedding_or_tensor_baseline
  exact_small_system_calibration_required: true
failure_conditions:
  - improvement_disappears_against_dmrg_or_exact_diagonalization
  - quantum_kernel_requires_unrealistic_state_preparation
  - embedding_error_exceeds_quantum_subroutine_gain
  - benchmark_model_too_small_or_too_easy
next_actions:
  - add_dmrg_or_tensor_network_reference
  - implement_quantum_impurity_kernel_interface
  - add_observable_errors_beyond_energy
  - move_from_1d_chain_to_2d_plaquette_proxy
