id: B7
problem_id: 21
name: Architecture-Level Fault-Tolerance Co-Design
version: 0.1
status: draft
claim: >
  Fault-tolerant quantum computing resources can be reduced by co-designing
  code distance, magic-state factories, layout, scheduling, and algorithmic
  block structure rather than optimizing each layer independently.
workload_families:
  - chemistry_phase_estimation
  - factoring_modular_arithmetic
  - hamiltonian_time_evolution
design_axes:
  - code_distance
  - data_block_layout
  - magic_state_factory_count
  - factory_throughput
  - lattice_surgery_schedule
  - routing_overhead
  - algorithmic_block_reuse
baselines:
  - surface_code_serial_factory_baseline
  - published_resource_estimates
  - single_layer_compiler_optimization
  - hand_tuned_lattice_surgery_schedule
metrics:
  - physical_qubits
  - runtime_cycles
  - runtime_seconds
  - space_time_volume
  - bottleneck_classification
  - reduction_against_baseline
acceptance_threshold:
  space_time_volume_reduction: ">=25%"
  workloads_meeting_threshold: ">=2"
  explicit_planning_model_disclaimer: true
failure_conditions:
  - improvement_depends_on_unrealistic_factory_throughput
  - code_distance_choice_violates_logical_failure_budget
  - layout_gain_disappears_with_routing_or_scheduling
  - algorithmic_reuse_double_counts_compiler_savings
next_actions:
  - connect_to_b1_circuit_compression_outputs
  - connect_to_b2_qec_threshold_and_decoder_models
  - add_lattice_surgery_dependency_graphs
  - compare_against_published_workload_resource_estimates
