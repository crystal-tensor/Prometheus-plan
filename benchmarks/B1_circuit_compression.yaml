id: B1
problem_id: 25
name: Hardware-Aware Quantum Circuit Compression
version: 0.1
status: draft
claim: >
  A constrained synthesis and rewrite loop can reduce hardware-weighted circuit
  cost without changing unitary behavior or measured output statistics.
input_families:
  - source: QASMBench
    url: https://github.com/pnnl/QASMBench
    categories:
      - arithmetic
      - chemistry
      - simulation
      - search
      - qft
  - source: MQT Bench
    url: https://github.com/munich-quantum-toolkit/bench
    categories:
      - cross_level_circuit_families
  - source: generated_qec_syndrome_circuits
    format: stim_or_openqasm
  - source: generated_chemistry_ansatz_circuits
    format: openqasm_or_cirq
hardware_models:
  - linear_nearest_neighbor
  - heavy_hex_like_sparse
  - all_to_all_ion_trap_like
  - neutral_atom_reconfigurable
baselines:
  - native_transpiler_light
  - native_transpiler_medium
  - native_transpiler_aggressive
  - peephole_optimizer
  - routing_aware_compiler
metrics:
  - logical_depth
  - two_qubit_gate_count
  - two_qubit_depth
  - t_count
  - t_depth
  - hardware_weighted_error_exposure
  - compile_time_seconds
  - equivalence_check_pass_rate
acceptance_threshold:
  median_hardware_weighted_cost_reduction: ">=20%"
  minimum_circuit_count: 30
  equivalence_failures: 0
  compile_time_overhead_vs_baseline: "<=10x"
failure_conditions:
  - gains_only_on_trivial_baseline_cases
  - equivalence_not_proven_or_statistically_validated
  - per_circuit_manual_tuning_required
next_actions:
  - implement_baseline_transpiler_runner
  - add_mqt_bench_subset
  - extend_single_qubit_resynthesis_across_commuting_gates
  - implement_2_to_4_qubit_hardware_aware_window_resynthesis
  - extend_equivalence_strategy_for_larger_circuits
